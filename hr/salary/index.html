<!DOCTYPE html>
<html lang="en" data-collection="hr" data-tool="SalaryBand">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalaryBand — Salary Band Calculator | tapdot</title>
  <meta name="description" content="Build and visualise salary bands and pay grades. Your compensation structure stays private — never uploaded to any server." />
  <meta property="og:title" content="SalaryBand — Salary Band Calculator | tapdot" />
  <meta property="og:description" content="Pay grades, compa-ratio, and range visualisation — all local." />
  <link rel="canonical" href="https://tools.tapdot.org/hr/salary/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/hr/hr.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">SalaryBand</h1>
    <p class="ts-tool-desc">Build pay grades and see where roles fall — compa-ratio included.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Compensation structure stays private — never uploaded anywhere</div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content:space-between">
      <p class="ts-card-label" style="margin-bottom:0">Pay grades</p>
      <button class="ts-btn ts-btn-secondary" id="addGrade" style="height:32px;padding:0 12px">+ Add grade</button>
    </div>
    <div class="ts-table-scroll ts-mt-sm">
      <table class="biz-matrix" id="gradeTable">
        <thead><tr><th>Grade</th><th>Min</th><th>Mid</th><th>Max</th><th></th></tr></thead>
        <tbody id="gradeBody"></tbody>
      </table>
    </div>
  </div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content:space-between">
      <p class="ts-card-label" style="margin-bottom:0">Roles</p>
      <button class="ts-btn ts-btn-secondary" id="addRole" style="height:32px;padding:0 12px">+ Add role</button>
    </div>
    <div class="ts-table-scroll ts-mt-sm">
      <table class="biz-matrix" id="roleTable">
        <thead><tr><th>Role</th><th>Grade</th><th>Salary</th><th>Compa-ratio</th><th></th></tr></thead>
        <tbody id="roleBody"></tbody>
      </table>
    </div>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Band visualisation</p>
    <div id="bandChart"></div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="salary.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
