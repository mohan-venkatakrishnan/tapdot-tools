<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">JobDescriptionWriter</h1>
    <p class="ts-tool-desc">Clear, inclusive job descriptions — on-device AI, with a language check.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>On-device AI — your hiring strategy never touches a server</div>

  <div class="ts-workbench">
    <div class="ts-card">
      <div><label class="ts-label" for="title">Role title</label><input class="ts-input" id="title" placeholder="Product Marketing Manager" /></div>
      <div class="ts-mt-md"><label class="ts-label" for="team">Team</label><input class="ts-input" id="team" placeholder="Growth Marketing" /></div>
      <div class="ts-mt-md"><label class="ts-label" for="responsibilities">Key responsibilities (comma-separated)</label><textarea class="ts-textarea" id="responsibilities" style="min-height:70px">own product launches, partner with sales on messaging, run customer research</textarea></div>
      <div class="ts-mt-md"><label class="ts-label" for="skills">Required skills</label><input class="ts-input" id="skills" placeholder="5+ years B2B marketing, strong writing" /></div>
      <div class="ts-mt-md"><label class="ts-label" for="niceToHave">Nice to have</label><input class="ts-input" id="niceToHave" placeholder="SaaS experience, SQL" /></div>
      <button class="ts-btn ts-btn-primary ts-mt-md" id="genBtn">Generate job description</button>
      <p class="biz-ai-status" id="aiStatus"></p>
    </div>
    <div class="ts-card">
      <div class="biz-row" style="justify-content:space-between">
        <p class="ts-card-label" style="margin-bottom:0">Job description</p>
        <button class="ts-copy-btn" id="copyBtn">Copy</button>
      </div>
      <div class="legal-doc" id="preview"></div>
      <div id="exclusionCard" class="ts-hidden ts-mt-md">
        <p class="ts-card-label">Potentially exclusionary language found</p>
        <div id="exclusionTags"></div>
      </div>
    </div>
  </div>
</main>
<footer class="ts-footer">

</html>
