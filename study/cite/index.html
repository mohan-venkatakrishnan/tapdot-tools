<!DOCTYPE html>
<html lang="en" data-collection="study" data-tool="CiteMaker">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiteMaker — Free Citation Generator | tapdot</title>
  <meta name="description" content="Generate APA, MLA, Chicago, Harvard, IEEE, Vancouver and ASA citations for websites, books, journal articles, videos and news. No signup, no ads. All processing happens in your browser." />
  <meta property="og:title" content="CiteMaker — Free Citation Generator | tapdot" />
  <meta property="og:description" content="7 citation styles, 5 source types. No signup, no ads, all in your browser." />
  <link rel="canonical" href="https://tools.tapdot.org/study/cite/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="cite.css" />
</head>
<body>

<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo">
    <img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" />
    <span>tapdot</span>
  </a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
    </svg>
  </button>
</nav>

<main class="ts-main">

  <div class="ts-tool-header">
    <h1 class="ts-tool-name">CiteMaker</h1>
    <p class="ts-tool-desc">7 citation styles, 5 source types. Generate instantly.</p>
  </div>

  <div class="ts-privacy-strip">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    Manual entry stays in your browser. URL lookup uses a public proxy — see Privacy.
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Citation style</p>
    <div class="ts-segment cite-style-segment" id="styleSegment">
      <button class="ts-segment-btn active" data-style="apa">APA</button>
      <button class="ts-segment-btn" data-style="mla">MLA</button>
      <button class="ts-segment-btn" data-style="chicago">Chicago</button>
      <button class="ts-segment-btn" data-style="harvard">Harvard</button>
      <button class="ts-segment-btn" data-style="ieee">IEEE</button>
      <button class="ts-segment-btn" data-style="vancouver">Vancouver</button>
      <button class="ts-segment-btn" data-style="asa">ASA</button>
    </div>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Source type</p>
    <div class="ts-segment cite-style-segment" id="typeSegment">
      <button class="ts-segment-btn active" data-type="website">Website</button>
      <button class="ts-segment-btn" data-type="book">Book</button>
      <button class="ts-segment-btn" data-type="journal">Journal article</button>
      <button class="ts-segment-btn" data-type="video">Video</button>
      <button class="ts-segment-btn" data-type="news">News / Magazine</button>
    </div>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Source</p>
    <div class="ts-segment" id="modeSegment" style="margin-bottom:16px">
      <button class="ts-segment-btn active" data-mode="manual">Manual entry</button>
      <button class="ts-segment-btn" data-mode="url">From URL</button>
    </div>

    <!-- URL mode -->
    <div id="urlMode" class="ts-hidden">
      <label class="ts-label" for="urlInput">Paste a link — we'll fetch the title and author</label>
      <div class="ts-row">
        <input class="ts-input ts-grow" id="urlInput" type="url"
               placeholder="https://example.com/article" />
        <button class="ts-btn ts-btn-secondary" id="fetchBtn">Fetch</button>
      </div>
      <p class="cite-status" id="fetchStatus"></p>
    </div>

    <!-- Manual fields — rebuilt per source type by cite.js -->
    <div id="manualFields" class="cite-grid"></div>

    <button class="ts-btn ts-btn-primary" id="generateBtn" style="margin-top:16px">
      Generate citation
    </button>
  </div>

  <div class="ts-output" id="output">
    <div class="ts-card">
      <div class="ts-row" style="justify-content:space-between">
        <p class="ts-card-label" style="margin-bottom:0" id="outLabel">Citation</p>
        <button class="ts-copy-btn" id="copyBtn">Copy</button>
      </div>
      <div class="ts-mono-output ts-mt-sm" id="citationOut"></div>
    </div>
  </div>

</main>

<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span>
  <span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a>
  <span class="ts-footer-dot">·</span>
  <span>All processing happens in your browser</span>
</footer>

<script src="/shared/shared.js"></script>
<script src="cite.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js'
  data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
