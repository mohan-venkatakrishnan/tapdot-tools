<!DOCTYPE html>
<html lang="en" data-collection="design" data-tool="ShadowStudio">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowStudio — CSS Box Shadow Generator | tapdot</title>
  <meta name="description" content="Build, preview, and copy CSS box shadows visually. Multiple layers, presets, live preview. No account. Fully local." />
  <meta property="og:title" content="ShadowStudio — CSS Box Shadow Generator | tapdot" />
  <meta property="og:description" content="Visual box-shadow builder with up to 5 layers and presets — fully local." />
  <link rel="canonical" href="https://tools.tapdot.org/design/shadows/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/design/design.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">ShadowStudio</h1>
    <p class="ts-tool-desc">Build layered CSS box shadows visually, with presets.</p>
  </div>

  <div class="shadow-preview-card" id="previewCard">Preview card</div>

  <div class="ts-card">
    <div class="biz-row">
      <span class="biz-muted">Presets:</span>
      <button class="ts-btn ts-btn-ghost" data-preset="flat">Flat</button>
      <button class="ts-btn ts-btn-ghost" data-preset="material">Material</button>
      <button class="ts-btn ts-btn-ghost" data-preset="neumorphic">Neumorphic</button>
      <button class="ts-btn ts-btn-ghost" data-preset="glass">Glass</button>
    </div>
  </div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content: space-between">
      <h2 class="ts-card-title">Layers</h2>
      <button class="ts-btn ts-btn-secondary" id="addLayer">+ Add layer</button>
    </div>
    <div id="layerList"></div>
  </div>

  <div class="ts-card">
    <pre class="ts-mono-output" id="exportOutput"></pre>
    <button class="ts-btn ts-btn-secondary ts-mt-md" id="copyExport">Copy CSS</button>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="shadows.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
