<!DOCTYPE html>
<html lang="en" data-collection="design" data-tool="GradientMaker">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradientMaker — CSS Gradient Generator | tapdot</title>
  <meta name="description" content="Build linear, radial, and conic CSS gradients visually. Preview on multiple backgrounds. Copy CSS. Fully local." />
  <meta property="og:title" content="GradientMaker — CSS Gradient Generator | tapdot" />
  <meta property="og:description" content="Visual gradient builder with colour stops and live preview — fully local." />
  <link rel="canonical" href="https://tools.tapdot.org/design/gradient/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/design/design.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">GradientMaker</h1>
    <p class="ts-tool-desc">Build linear, radial, or conic CSS gradients visually.</p>
  </div>

  <div class="gradient-preview" id="gradientPreview"></div>
  <div class="gradient-bg-toggle">
    <button class="ts-btn ts-btn-ghost active" data-bg="white">White</button>
    <button class="ts-btn ts-btn-ghost" data-bg="black">Black</button>
    <button class="ts-btn ts-btn-ghost" data-bg="card">Card</button>
    <button class="ts-btn ts-btn-ghost" data-bg="page">Page</button>
  </div>

  <div class="ts-card">
    <div class="ts-segment" id="typeTabs">
      <button class="ts-segment-btn active" data-type="linear">Linear</button>
      <button class="ts-segment-btn" data-type="radial">Radial</button>
      <button class="ts-segment-btn" data-type="conic">Conic</button>
    </div>
    <div id="angleField" class="design-field ts-mt-md">
      <label for="angle">Angle <span class="val" id="angleVal">90°</span></label>
      <input type="range" id="angle" min="0" max="360" value="90" />
    </div>
  </div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content: space-between">
      <h2 class="ts-card-title">Colour stops</h2>
      <button class="ts-btn ts-btn-secondary" id="addStop">+ Add stop</button>
    </div>
    <div id="stopList"></div>
  </div>

  <div class="ts-card">
    <div class="ts-segment" id="exportTabs">
      <button class="ts-segment-btn active" data-fmt="css">CSS</button>
      <button class="ts-segment-btn" data-fmt="tailwind">Tailwind utility</button>
    </div>
    <pre class="ts-mono-output" id="exportOutput"></pre>
    <button class="ts-btn ts-btn-secondary ts-mt-md" id="copyExport">Copy</button>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="gradient.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
