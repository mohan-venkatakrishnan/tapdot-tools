<!DOCTYPE html>
<html lang="en" data-collection="design" data-tool="PaletteForge">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaletteForge — Colour Palette Generator | tapdot</title>
  <meta name="description" content="Generate colour palettes from a base colour. Export as CSS, Tailwind, or HSL. WCAG contrast ratios included. Fully private." />
  <meta property="og:title" content="PaletteForge — Colour Palette Generator | tapdot" />
  <meta property="og:description" content="Generate a 5-colour palette with CSS/Tailwind export and contrast ratios — fully local." />
  <link rel="canonical" href="https://tools.tapdot.org/design/palette/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/design/design.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">PaletteForge</h1>
    <p class="ts-tool-desc">Generate a colour palette from a base colour — with CSS, Tailwind, and contrast ratios.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Unreleased brand colours never leave your browser</div>

  <div class="ts-card">
    <div class="color-swatch-row">
      <input type="color" id="baseColorPicker" class="color-swatch" value="#4E8FC4" />
      <input class="ts-input color-hex-input" id="baseHex" value="#4E8FC4" style="max-width:140px" />
      <button class="ts-btn ts-btn-secondary" id="randomize">Randomize</button>
    </div>
  </div>

  <div class="ts-card">
    <h2 class="ts-card-title">Palette</h2>
    <div class="palette-grid" id="paletteGrid"></div>
  </div>

  <div class="ts-card">
    <h2 class="ts-card-title">Contrast ratios (WCAG)</h2>
    <table class="ts-table contrast-table" id="contrastTable"></table>
  </div>

  <div class="ts-card">
    <div class="ts-segment" id="exportTabs">
      <button class="ts-segment-btn active" data-fmt="css">CSS variables</button>
      <button class="ts-segment-btn" data-fmt="tailwind">Tailwind config</button>
      <button class="ts-segment-btn" data-fmt="hsl">HSL values</button>
    </div>
    <pre class="ts-mono-output" id="exportOutput"></pre>
    <button class="ts-btn ts-btn-secondary ts-mt-md" id="copyExport">Copy</button>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="palette.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
