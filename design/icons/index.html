<!DOCTYPE html>
<html lang="en" data-collection="design" data-tool="IconExplorer">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IconExplorer — Free SVG Icon Browser | tapdot</title>
  <meta name="description" content="Browse and copy open-source-style outline SVG icons. Search, copy as SVG, React JSX, or Vue. Adjust stroke width and colour. Works offline." />
  <meta property="og:title" content="IconExplorer — Free SVG Icon Browser | tapdot" />
  <meta property="og:description" content="A curated outline icon set — search, preview, and copy as SVG/JSX/Vue, fully offline." />
  <link rel="canonical" href="https://tools.tapdot.org/design/icons/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/design/design.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">IconExplorer</h1>
    <p class="ts-tool-desc">A curated outline icon set — search, style, and copy as SVG, JSX, or Vue.</p>
  </div>

  <div class="design-workbench">
    <div>
      <div class="ts-card">
        <label class="ts-label" for="strokeWidth">Stroke width <span id="strokeVal">2</span></label>
        <input type="range" id="strokeWidth" min="1" max="3" step="0.25" value="2" style="width:100%" />
        <label class="ts-label ts-mt-md" for="iconColor">Colour</label>
        <input type="color" id="iconColor" value="#4E8FC4" style="width:100%;height:36px;border:none" />
        <label class="ts-label ts-mt-md" for="categoryFilter">Category</label>
        <select class="ts-select" id="categoryFilter" style="width:100%">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="ts-card">
        <div class="ts-segment" id="copyFmt" style="flex-direction:column">
          <button class="ts-segment-btn active" data-fmt="svg">SVG</button>
          <button class="ts-segment-btn" data-fmt="jsx">React JSX</button>
          <button class="ts-segment-btn" data-fmt="vue">Vue</button>
          <button class="ts-segment-btn" data-fmt="path">Path data only</button>
        </div>
      </div>
    </div>
    <div>
      <div class="icon-search-bar">
        <input class="ts-input" id="iconSearch" placeholder="Search icons by name…" />
      </div>
      <div class="icon-grid" id="iconGrid"></div>
    </div>
  </div>
</main>
<div class="icon-copied-toast" id="copiedToast">Copied!</div>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="/design/libs/icons.js"></script>
<script src="icons.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
