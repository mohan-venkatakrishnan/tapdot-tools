<!DOCTYPE html>
<html lang="en" data-collection="productivity" data-tool="ReadingList">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadingList — Private Reading List Manager | tapdot</title>
  <meta name="description" content="Save articles and books to read later. Add notes. Track reading status. Saved locally. Nothing sent to any server." />
  <meta property="og:title" content="ReadingList — Private Reading List Manager | tapdot" />
  <meta property="og:description" content="A private to-read list with status tracking, notes, and Markdown export." />
  <link rel="canonical" href="https://tools.tapdot.org/productivity/reading/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/productivity/productivity.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">ReadingList</h1>
    <p class="ts-tool-desc">Save articles and books to read later, with notes and status.</p>
  </div>

  <div class="ts-card">
    <div class="biz-grid-2">
      <div><label class="ts-label" for="itemTitle">Title</label><input class="ts-input" id="itemTitle" placeholder="e.g. Designing Data-Intensive Applications" /></div>
      <div><label class="ts-label" for="itemAuthor">Author (optional)</label><input class="ts-input" id="itemAuthor" placeholder="e.g. Martin Kleppmann" /></div>
      <div><label class="ts-label" for="itemUrl">URL (optional)</label><input class="ts-input" id="itemUrl" placeholder="https://…" /></div>
      <div><label class="ts-label" for="itemType">Type</label>
        <select class="ts-select" id="itemType" style="width:100%">
          <option value="article">Article</option>
          <option value="book">Book</option>
          <option value="paper">Paper</option>
        </select>
      </div>
    </div>
    <button class="ts-btn ts-btn-primary ts-mt-md" id="addItem">Add to list</button>
  </div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content: space-between">
      <div class="ts-segment" id="statusFilter">
        <button class="ts-segment-btn active" data-status="">All</button>
        <button class="ts-segment-btn" data-status="to-read">To read</button>
        <button class="ts-segment-btn" data-status="reading">Reading</button>
        <button class="ts-segment-btn" data-status="done">Done</button>
      </div>
      <div class="ts-segment" id="typeFilter">
        <button class="ts-segment-btn active" data-type="">All types</button>
        <button class="ts-segment-btn" data-type="article">Articles</button>
        <button class="ts-segment-btn" data-type="book">Books</button>
        <button class="ts-segment-btn" data-type="paper">Papers</button>
      </div>
    </div>
    <div id="readingList" class="ts-mt-md"></div>
  </div>

  <div class="ts-card">
    <button class="ts-btn ts-btn-secondary" id="exportMd">Export as Markdown</button>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="reading.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
