<!DOCTYPE html>
<html lang="en" data-collection="marketing" data-tool="UTMBuilder">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTMBuilder — UTM Parameter Generator | tapdot</title>
  <meta name="description" content="Build and manage UTM tracking links. History saved locally. No data sent to any server. Free alternative to Google's Campaign URL Builder." />
  <meta property="og:title" content="UTMBuilder — UTM Parameter Generator | tapdot" />
  <meta property="og:description" content="Build UTM tracking links locally — history saved in your browser only." />
  <link rel="canonical" href="https://tools.tapdot.org/marketing/utm/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/marketing/marketing.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">UTMBuilder</h1>
    <p class="ts-tool-desc">Build UTM tracking links — history saved in your browser only.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Everything runs in your browser — nothing is sent anywhere</div>

  <div class="ts-pill-tabs" id="modeTabs">
    <button class="ts-pill-tab active" data-mode="single">Single link</button>
    <button class="ts-pill-tab" data-mode="bulk">Bulk mode</button>
  </div>

  <div class="ts-card ts-mt-md" id="singlePane">
    <p class="ts-card-label">Base URL</p>
    <input class="ts-input" id="baseUrl" placeholder="https://example.com/landing-page" />
    <div class="biz-grid-2 ts-mt-md">
      <div><label class="ts-label" for="source">Campaign Source *</label><input class="ts-input" id="source" placeholder="google, newsletter, facebook" /></div>
      <div><label class="ts-label" for="medium">Campaign Medium *</label><input class="ts-input" id="medium" placeholder="cpc, email, social" /></div>
      <div><label class="ts-label" for="campaign">Campaign Name *</label><input class="ts-input" id="campaign" placeholder="summer_sale" /></div>
      <div><label class="ts-label" for="term">Campaign Term</label><input class="ts-input" id="term" placeholder="running+shoes (optional)" /></div>
      <div class="cite-field-full"><label class="ts-label" for="content">Campaign Content</label><input class="ts-input" id="content" placeholder="logolink / textlink (optional)" /></div>
    </div>
    <button class="ts-btn ts-btn-primary ts-mt-md" id="buildBtn">Build URL</button>
  </div>

  <div class="ts-card ts-hidden" id="bulkPane">
    <p class="ts-card-label">Base URLs (one per line)</p>
    <textarea class="ts-textarea" id="bulkUrls" placeholder="https://example.com/page-1&#10;https://example.com/page-2"></textarea>
    <div class="biz-grid-2 ts-mt-md">
      <div><label class="ts-label" for="bSource">Campaign Source</label><input class="ts-input" id="bSource" placeholder="newsletter" /></div>
      <div><label class="ts-label" for="bMedium">Campaign Medium</label><input class="ts-input" id="bMedium" placeholder="email" /></div>
      <div class="cite-field-full"><label class="ts-label" for="bCampaign">Campaign Name</label><input class="ts-input" id="bCampaign" placeholder="q3_launch" /></div>
    </div>
    <button class="ts-btn ts-btn-primary ts-mt-md" id="bulkBuildBtn">Build all URLs</button>
  </div>

  <div class="ts-output" id="output">
    <div class="ts-card">
      <div class="biz-row" style="justify-content:space-between"><p class="ts-card-label" style="margin-bottom:0">Result</p><button class="ts-copy-btn" id="copyOut">Copy all</button></div>
      <div class="ts-mono-output ts-mt-sm" id="resultOut" style="max-height:320px;overflow:auto"></div>
    </div>
  </div>

  <div class="ts-card">
    <div class="biz-row" style="justify-content:space-between"><p class="ts-card-label" style="margin-bottom:0">History (last 20)</p><button class="ts-btn ts-btn-ghost" id="clearHistory" style="height:30px;padding:0 12px">Clear</button></div>
    <div id="historyList"></div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="utm.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
