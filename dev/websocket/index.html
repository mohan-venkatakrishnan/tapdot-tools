<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="WSTester">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WSTester — WebSocket Tester | tapdot</title>
  <meta name="description" content="Connect to any WebSocket server, send messages, and watch the responses live. Your browser connects directly to the server — tapdot is never in the middle." />
  <meta property="og:title" content="WSTester — WebSocket Tester | tapdot" />
  <meta property="og:description" content="Connect, send, and inspect WebSocket messages live." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/websocket/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">WSTester</h1>
    <p class="ts-tool-desc">Connect, send, and inspect WebSocket messages live.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Your browser connects DIRECTLY to the WebSocket server you enter — no proxy, and tapdot never sees your traffic</div>

  <div class="ts-card">
    <div class="dev-row" style="flex-wrap:nowrap">
      <input class="ts-input ts-grow" id="wsUrl" value="wss://echo.websocket.org" style="font-family:var(--font-mono)" />
      <button class="ts-btn ts-btn-primary" id="connectBtn">Connect</button>
    </div>
    <p class="ts-mt-sm"><span class="dev-badge" id="wsStatus">Disconnected</span></p>
  </div>
  <div class="ts-workbench">
    <div class="ts-card">
      <p class="ts-card-label">Send a message</p>
      <textarea class="ts-textarea ts-code-input" id="wsMsg" placeholder='{"hello": "world"}'></textarea>
      <div class="dev-row ts-mt-sm">
        <button class="ts-btn ts-btn-secondary" id="sendBtn" disabled>Send</button>
        <button class="ts-btn ts-btn-ghost" id="clearLog">Clear log</button>
      </div>
    </div>
    <div class="ts-card">
      <p class="ts-card-label">Messages</p>
      <div class="ts-code-output ws-log" id="wsLog" style="max-height:380px;overflow-y:auto"></div>
    </div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="websocket.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
