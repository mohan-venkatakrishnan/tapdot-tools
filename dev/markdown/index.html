<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="MarkdownLive">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkdownLive — Markdown Editor with Preview | tapdot</title>
  <meta name="description" content="Split-pane Markdown editor with live preview. Autosaves to your browser. No cloud sync. No account." />
  <meta property="og:title" content="MarkdownLive — Markdown Editor with Preview | tapdot" />
  <meta property="og:description" content="Split-pane Markdown editor with live preview. Autosaves locally, no cloud." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/markdown/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">MarkdownLive</h1>
    <p class="ts-tool-desc">Split-pane Markdown editor with live preview — autosaves locally.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Autosaves to your browser only — no cloud sync, no account</div>

  <div class="dev-toolbar" id="toolbar">
    <button data-a="bold" title="Bold"><b>B</b></button>
    <button data-a="italic" title="Italic"><i>I</i></button>
    <button data-a="h1" title="Heading">H</button>
    <button data-a="link" title="Link">Link</button>
    <button data-a="code" title="Inline code">&lt;/&gt;</button>
    <button data-a="ul" title="List">• List</button>
    <button data-a="quote" title="Quote">&ldquo; Quote</button>
    <button data-a="hr" title="Divider">— HR</button>
  </div>
  <div class="ts-workbench">
    <div class="ts-card" style="padding:12px"><textarea class="ts-textarea ts-code-input" id="input" style="min-height:440px;border:none;background:transparent" placeholder="# Hello&#10;&#10;Type **Markdown** and watch it render →"></textarea></div>
    <div class="ts-card"><div class="md-preview" id="preview"></div></div>
  </div>
  <div class="dev-row ts-mt-md" style="justify-content:space-between">
    <span class="dev-muted" id="status"></span>
    <div class="dev-row"><button class="ts-btn ts-btn-secondary" id="dlMd">Download .md</button><button class="ts-btn ts-btn-ghost" id="copyHtml">Copy HTML</button></div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="markdown.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
