<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">TimestampConvert</h1>
    <p class="ts-tool-desc">Unix timestamp ⇄ human date, live and across timezones.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Pure JavaScript date math — nothing sent anywhere</div>

  <div class="ts-card" style="text-align:center">
    <p class="ts-card-label">Current Unix time</p>
    <div class="ts-stat-num" id="nowTs" style="font-family:var(--font-mono)">—</div>
    <button class="ts-btn ts-btn-ghost ts-mt-sm" id="copyNow">Copy</button>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Timestamp → Date</p>
    <div class="dev-row">
      <input class="ts-input ts-grow" id="tsInput" type="number" placeholder="1773081755" style="font-family:var(--font-mono)" />
      <select class="ts-select" id="unit"><option value="s">seconds</option><option value="ms">milliseconds</option></select>
    </div>
    <p class="ts-err-msg ts-mt-sm" id="err1"></p>
    <div class="ts-field-row ts-mt-sm" id="tsOut"></div>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Date → Timestamp</p>
    <div class="dev-row">
      <input class="ts-input" id="dateInput" type="date" />
      <input class="ts-input" id="timeInput" type="time" step="1" />
      <select class="ts-select" id="tzInput" data-searchable></select>
    </div>
    <p class="ts-err-msg ts-mt-sm" id="err2"></p>
    <div class="ts-field-row ts-mt-sm" id="dateOut"></div>
  </div>
</main>
