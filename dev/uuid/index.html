<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="UUIDGen">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UUIDGen — UUID &amp; Token Generator | tapdot</title>
  <meta name="description" content="Generate UUID v4, UUID v7, ULID, nanoid, and random tokens in your browser. IDs are generated locally — never sent to any server." />
  <meta property="og:title" content="UUIDGen — UUID & Token Generator | tapdot" />
  <meta property="og:description" content="UUID v4/v7, ULID, nanoid, random tokens — generated locally." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/uuid/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">UUIDGen</h1>
    <p class="ts-tool-desc">UUID v4/v7, ULID, nanoid and random tokens — generated locally.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Generated with the Web Crypto API — never sent to any server</div>

  <div class="ts-card">
    <div class="dev-row">
      <div><label class="ts-label" for="fmt">Format</label>
        <select class="ts-select" id="fmt">
          <option value="uuidv4">UUID v4 (random)</option>
          <option value="uuidv7">UUID v7 (time-ordered)</option>
          <option value="ulid">ULID</option>
          <option value="nanoid">nanoid</option>
          <option value="hex">Random hex (32)</option>
          <option value="base64">Random base64url (32)</option>
        </select>
      </div>
      <div><label class="ts-label" for="qty">Quantity</label>
        <input class="ts-input" id="qty" type="number" value="5" min="1" max="1000" style="max-width:120px" />
      </div>
    </div>
    <div class="dev-row ts-mt-md">
      <button class="ts-btn ts-btn-primary" id="gen">Generate</button>
      <button class="ts-btn ts-btn-secondary" id="copyAll">Copy all</button>
      <button class="ts-btn ts-btn-ghost" id="download">Download .txt</button>
    </div>
    <p class="dev-muted ts-mt-sm" id="fmtNote"></p>
  </div>

  <div class="ts-card"><div class="uuid-list" id="list"></div></div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="uuid.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
