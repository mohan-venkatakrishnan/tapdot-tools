<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="JSONLab">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSONLab — JSON Formatter &amp; Validator | tapdot</title>
  <meta name="description" content="Format, validate, minify and diff JSON in your browser. No server. Safe for API keys and confidential configs." />
  <meta property="og:title" content="JSONLab — JSON Formatter & Validator | tapdot" />
  <meta property="og:description" content="Format, validate, minify and diff JSON — all in your browser." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/json/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">JSONLab</h1>
    <p class="ts-tool-desc">Format, validate, minify and diff JSON — safe for keys and configs.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Everything runs in your browser — safe to paste tokens and configs</div>

  <div class="ts-pill-tabs" id="modes">
    <button class="ts-pill-tab active" data-mode="format">Format</button>
    <button class="ts-pill-tab" data-mode="validate">Validate</button>
    <button class="ts-pill-tab" data-mode="minify">Minify</button>
    <button class="ts-pill-tab" data-mode="diff">Diff</button>
  </div>

  <div id="single" class="ts-mt-md">
    <div class="ts-card">
      <div class="dev-row" style="justify-content:space-between">
        <p class="ts-card-label" style="margin-bottom:0">Input JSON</p>
        <div class="dev-row" id="indentWrap">
          <span class="dev-muted">Indent</span>
          <select class="ts-select" id="indent" style="height:32px">
            <option value="2">2 spaces</option><option value="4">4 spaces</option><option value="t">Tab</option>
          </select>
        </div>
      </div>
      <textarea class="ts-textarea ts-code-input ts-mt-sm" id="input" placeholder='{"hello":"world","n":42}'></textarea>
      <p class="ts-err-msg ts-mt-sm" id="msg"></p>
    </div>
    <div class="ts-card">
      <div class="dev-row" style="justify-content:space-between"><p class="ts-card-label" style="margin-bottom:0" id="outLabel">Output</p><button class="ts-copy-btn" id="copyOut">Copy</button></div>
      <div class="ts-code-output ts-mt-sm" id="output"></div>
    </div>
  </div>

  <div id="diffPane" class="ts-hidden ts-mt-md">
    <div class="ts-workbench">
      <div class="ts-card"><p class="ts-card-label">JSON A</p><textarea class="ts-textarea ts-code-input" id="diffA" placeholder='{"a":1,"b":2}'></textarea></div>
      <div class="ts-card"><p class="ts-card-label">JSON B</p><textarea class="ts-textarea ts-code-input" id="diffB" placeholder='{"a":1,"b":3,"c":4}'></textarea></div>
    </div>
    <div class="ts-card"><p class="ts-card-label" id="diffSummary">Differences</p><div class="ts-code-output" id="diffOut"></div></div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="json.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
