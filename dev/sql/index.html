<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="SQLFormat">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLFormat — SQL Formatter &amp; Beautifier | tapdot</title>
  <meta name="description" content="Format and beautify SQL queries in your browser. Safe for queries containing real table names, column names, and internal logic." />
  <meta property="og:title" content="SQLFormat — SQL Formatter & Beautifier | tapdot" />
  <meta property="og:description" content="Beautify SQL locally — safe for real schema and column names." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/sql/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">SQLFormat</h1>
    <p class="ts-tool-desc">Format and beautify SQL — safe for real schema names.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Formatted in your browser — your queries never leave the page</div>

  <div class="ts-card">
    <div class="dev-row" style="justify-content:space-between">
      <p class="ts-card-label" style="margin-bottom:0">SQL query</p>
      <div class="dev-row">
        <select class="ts-select" id="case" style="height:32px"><option value="upper">UPPERCASE</option><option value="lower">lowercase</option><option value="preserve">Preserve</option></select>
        <select class="ts-select" id="indent" style="height:32px"><option value="2">2 spaces</option><option value="4">4 spaces</option></select>
      </div>
    </div>
    <textarea class="ts-textarea ts-code-input ts-mt-sm" id="input" placeholder="select id, name from users u join orders o on o.user_id=u.id where u.active=1 order by name"></textarea>
  </div>
  <div class="ts-card">
    <div class="dev-row" style="justify-content:space-between"><p class="ts-card-label" style="margin-bottom:0">Formatted</p><button class="ts-copy-btn" id="copyOut">Copy</button></div>
    <div class="ts-code-output ts-mt-sm" id="output"></div>
  </div>
  <div class="ts-stats-grid" id="stats"></div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="sql.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
