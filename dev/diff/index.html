<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="DiffCheck">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('tapdot-theme');var d=matchMedia('(prefers-color-scheme: dark)').matches;if(t==='dark'||(!t&&d))document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiffCheck — Text Diff Checker | tapdot</title>
  <meta name="description" content="Compare two texts and see line-by-line differences highlighted. Your documents never leave your browser — unlike online diff sites." />
  <meta property="og:title" content="DiffCheck — Text Diff Checker | tapdot" />
  <meta property="og:description" content="Line-by-line text comparison with additions and removals highlighted." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/diff/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main ts-main-wide">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">DiffCheck</h1>
    <p class="ts-tool-desc">Line-by-line text comparison with additions and removals highlighted.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Both texts stay in your browser — nothing is uploaded to compare them</div>

  <div class="ts-workbench">
    <div class="ts-card">
      <p class="ts-card-label">Original</p>
      <textarea class="ts-textarea ts-code-input" id="left" placeholder="Paste the original text…"></textarea>
    </div>
    <div class="ts-card">
      <p class="ts-card-label">Changed</p>
      <textarea class="ts-textarea ts-code-input" id="right" placeholder="Paste the changed text…"></textarea>
    </div>
  </div>
  <div class="ts-card">
    <div class="dev-row" style="justify-content:space-between">
      <p class="ts-card-label" style="margin-bottom:0">Differences</p>
      <span style="display:flex;gap:8px;align-items:center"><button class="ts-btn ts-btn-ghost" id="prevDiff" style="height:28px;padding:0 10px">◀ Prev</button><button class="ts-btn ts-btn-ghost" id="nextDiff" style="height:28px;padding:0 10px">Next ▶</button><span class="dev-badge" id="diffPos"></span><span class="dev-badge" id="diffStats"></span></span>
    </div>
    <div class="ts-code-output diff-out" id="diffOut"></div>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="diff.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
