<!DOCTYPE html>
<html lang="en" data-collection="dev" data-tool="HTMLPreview">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTMLPreview — HTML Renderer &amp; Sandbox | tapdot</title>
  <meta name="description" content="Paste raw HTML and see it rendered instantly in a safe sandbox. Perfect for email templates, component snippets, and prototypes." />
  <meta property="og:title" content="HTMLPreview — HTML Renderer & Sandbox | tapdot" />
  <meta property="og:description" content="Render raw HTML in a sandboxed iframe, instantly and privately." />
  <link rel="canonical" href="https://tools.tapdot.org/dev/html/" />
  <link rel="icon" type="image/png" href="/assets/tapdot-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/shared.css" />
  <link rel="stylesheet" href="/dev/dev.css" />
</head>
<body>
<nav class="ts-nav">
  <a href="https://tapdot.org" class="ts-nav-logo"><img src="/assets/tapdot-icon.png" width="22" height="22" alt="tapdot" /><span>tapdot</span></a>
  <button class="ts-dark-toggle" id="darkToggle" aria-label="Toggle dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg></button>
</nav>
<main class="ts-main">
  <div class="ts-tool-header">
    <h1 class="ts-tool-name">HTMLPreview</h1>
    <p class="ts-tool-desc">Render raw HTML instantly in a safe, sandboxed frame.</p>
  </div>
  <div class="ts-privacy-strip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Rendered in a sandboxed frame — it cannot access your browser data</div>

  <div class="ts-card">
    <div class="dev-row" style="justify-content:space-between">
      <p class="ts-card-label" style="margin-bottom:0">HTML input</p>
      <select class="ts-select" id="device" style="height:32px"><option value="desktop">Desktop</option><option value="tablet">Tablet</option><option value="mobile">Mobile</option></select>
    </div>
    <textarea class="ts-textarea ts-code-input ts-mt-sm" id="input" placeholder="<h1>Hello</h1>&#10;<p>Paste any HTML here.</p>"></textarea>
    <div class="dev-row ts-mt-sm"><button class="ts-btn ts-btn-ghost" id="dl">Download .html</button><button class="ts-copy-btn" id="copyHtml">Copy HTML</button></div>
  </div>

  <div class="ts-card">
    <p class="ts-card-label">Preview</p>
    <iframe id="frame" class="html-frame" sandbox="allow-scripts allow-forms" title="HTML preview"></iframe>
  </div>
</main>
<footer class="ts-footer">
  <span>Built by <a href="https://tapdot.org">tapdot</a></span><span class="ts-footer-dot">·</span>
  <a href="/privacy.html">Privacy</a><span class="ts-footer-dot">·</span><span>All processing happens in your browser</span>
</footer>
<script src="/shared/shared.js"></script>
<script src="html.js" defer></script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "YOUR_CLOUDFLARE_TOKEN"}'></script>
</body>
</html>
